<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Palindrome checker</h1>
    <script>
        let str="madam1"
        let i=0,j=str.length-1, palindrome=true
        while(i<j){
            if(str.charAt(i)!=str.charAt(j)){
                palindrome=false
                break
            }
            i++
            j--
        }
        if(palindrome){
            console.log("Yes")
        }
        else {
            console.log("No")
        }
        

    </script>
</body>
</html>
